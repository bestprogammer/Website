<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:black;color:white;height:100vh;overflow:hidden;font-family:Arial,sans-serif;}

/* MAIN FULLSCREEN */
#main{
  position:fixed;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:25px;background:linear-gradient(180deg,#000814,#001d3d);
}

/* LINKS */
#links{font-size:0.85rem;line-height:1.7}
#links a{color:#aaa;margin-right:10px;text-decoration:none}
#links a:hover{color:white}

/* SHUFFLE */
#shuffle{margin-top:12px;padding:8px 14px;background:#111;color:white;border:none;cursor:pointer}

/* TEXT CENTER */
#text{text-align:center;font-size:2rem;font-family:"Comic Sans MS",cursive;line-height:1.7}

/* DOWNLOAD */
#download{width:100%;padding:20px;font-size:2rem;background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;border:none;cursor:pointer}

/* TERMINAL */
#terminal{position:fixed;inset:0;background:black;color:#00ff00;font-family:monospace;padding:20px;display:none;overflow:auto;white-space:pre-wrap}

/* SECRET BUTTON */
#secretBtn{position:fixed;bottom:20px;right:20px;padding:10px 15px;background:#222;color:white;border:none;display:none;cursor:pointer;z-index:9999}

/* OCTOCAT ANIMATION */
#octocat{position:fixed;bottom:50px;left:-200px;width:150px;z-index:9998;transition:left 5s linear;transform:rotate(0deg);}
#octocat.jump{animation:jump 1s infinite alternate;}
@keyframes jump{0%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(10deg);}100%{transform:translateY(0) rotate(-10deg);}}
</style>
</head>
<body>

<div id="terminal"></div>

<button id="secretBtn" onclick="runCat()">🐱 Launch Octocat</button>
<img id="octocat" src="https://github.githubassets.com/images/modules/logos_page/Octocat.png">

function shuffleLinks(){
  const container=document.getElementById("links");
  container.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    container.appendChild(a);
  });
}
shuffleLinks();

/* TERMINAL GLITCH */
function startTerminal(){
  document.getElementById("main").style.display="none";
  const term=document.getElementById("terminal");
  term.style.display="block";
  term.innerHTML="";

  const lines=[
"FREE STARLINK WIFI SYSTEM v9.9.9",
"Connecting to Temu Satellite...",
"Verifying Elon Musk approval...",
"Cybertruck detected...",
"Initializing Galactic Internet..."
  ];

  let i=0;
  function randomChar(){const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";return chars[Math.floor(Math.random()*chars.length)];}
  function typeLine(text,callback){
    let progress=0;
    const interval=setInterval(()=>{
      let output="";
      for(let j=0;j<text.length;j++){output+= j<progress ? text[j] : randomChar();}
      term.innerHTML="\n"+output;
      progress++;
      if(progress>text.length){clearInterval(interval);term.innerHTML+="\n";callback();}
    },30);
  }
  function next(){if(i<lines.length){typeLine(lines[i],()=>{i++;next();});} else {loadPercent();}}
  next();
}

function loadPercent(){
  const term=document.getElementById("terminal");
  let percent=0;
  const interval=setInterval(()=>{
    term.innerHTML="Downloading Galactic WiFi: "+percent+"%\n";
    percent++;
    if(percent>100){clearInterval(interval);term.innerHTML+="\nConnection established.\nRedirecting...\n";
      setTimeout(()=>{window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0";},2000);}
  },25);
}

/* EASTER EGG CLICK COUNTER */
let clickCount=0;
document.addEventListener("click",()=>{
  clickCount++;
  if(clickCount===20){document.getElementById("secretBtn").style.display="block";}
});

/* OCTOCAT RUN */
function runCat(){
  const cat=document.getElementById("octocat");
  cat.classList.add("jump");
  cat.style.left="120vw";
  setTimeout(()=>{cat.classList.remove("jump"); cat.style.left="-200px";},5000);
}
</script>

</body>
