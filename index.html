<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Originake Starlink WiFi</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;inset:0;
  background:black;
  display:flex;align-items:center;justify-content:center;
  z-index:20000;
}
.glitch{
  font-size:clamp(2rem,6vw,4rem);
  font-weight:bold;
  position:relative;
  animation:skew 1s infinite alternate;
}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;left:0;width:100%;
}
.glitch::before{color:red;transform:translate(-4px,-2px)}
.glitch::after{color:blue;transform:translate(4px,2px)}
@keyframes skew{0%{transform:skew(0)}50%{transform:skew(2deg)}100%{transform:skew(-2deg)}}

/* BIOS + TERMINAL */
#bios,#terminal,#hack-screen{
  position:fixed;inset:0;
  background:black;color:#00ff00;
  font-family:monospace;
  padding:5vw;
  display:none;
  overflow:auto;
  z-index:15000;
}
#terminal span{color:#00ffff}

/* MAIN UI */
.aero{
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
  padding:2.5rem;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  text-align:center;
  width:min(95vw,900px);
  display:none;
}
h1{margin-bottom:1rem}
.description{
  font-size:0.9rem;
  opacity:0.85;
  margin-bottom:1.5rem;
  line-height:1.4;
}
.menu{margin-bottom:1rem;font-size:0.85rem}
.menu a{margin:0 6px;color:#ddd;text-decoration:none}
.menu a:hover{color:white}
button{
  padding:0.8rem 1.5rem;
  border:none;
  border-radius:12px;
  cursor:pointer;
  margin:0.4rem;
}
.download-btn{
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  color:white;
  transform:scale(0.1);
  animation:grow 1.2s forwards, float 2s infinite ease-in-out 1.2s;
}
@keyframes grow{to{transform:scale(1)}}
@keyframes float{
  0%{transform:scale(1) translateY(0)}
  50%{transform:scale(1.05) translateY(-8px)}
  100%{transform:scale(1) translateY(0)}
}
.shuffle-btn{background:#222;color:white}

/* GRAPH */
.graph{
  width:100%;
  height:120px;
  background:#111;
  margin-top:1rem;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}
.line{
  position:absolute;
  bottom:0;
  width:2px;
  background:#00ffcc;
}
</style>
</head>
<body>

<div id="intro">
  <div class="glitch" data-text="ORIGINAKE STARLINK">ORIGINAKE STARLINK</div>
</div>

<div id="bios"></div>
<div id="terminal"></div>
<div id="hack-screen"></div>

<div class="aero" id="main">
  <h1>🚀 Originake Starlink WiFi</h1>
  <div class="description">
    Connecting to private low-orbit satellite infrastructure.<br>
    Routing via encrypted mesh network nodes.<br>
    Powered by experimental aerospace uplink technology.<br>
    Global coverage simulation enabled.<br><br>
    Satellite cluster sync: ACTIVE<br>
    Deep Space Relay: CONNECTED
  </div>
  <div class="menu" id="prank-menu"></div>

  <button class="download-btn" onclick="startFakeHack()">⬇️ Download</button>
  <button class="shuffle-btn" onclick="shuffleLinks()">🔀 Shuffle</button>

  <div class="graph" id="graph1"></div>
  <div class="graph" id="graph2"></div>
</div>

<script>
/* INTRO */
setTimeout(()=>{intro.style.display="none";startBIOS();},2500);

/* BIOS */
const bios=document.getElementById("bios");
const terminal=document.getElementById("terminal");
const main=document.getElementById("main");
const hackScreen=document.getElementById("hack-screen");

const biosLines=[
"Phoenix BIOS v12.4.7",
"Memory Test: 32768MB OK",
"Initializing Satellite Array...",
"Authenticating Space Relay...",
"Booting Originake Starlink OS..."
];

let i=0;
function typeLines(target,lines,callback){
  if(i<lines.length){
    let line=document.createElement("div");
    target.appendChild(line);
    let text=lines[i];let j=0;
    let typing=setInterval(()=>{
      line.textContent+=text[j];j++;
      if(j>=text.length){clearInterval(typing);i++;setTimeout(()=>typeLines(target,lines,callback),150);}
    },15);
  }else{i=0;setTimeout(callback,800);}
}
function startBIOS(){bios.style.display="block";typeLines(bios,biosLines,()=>{bios.style.display="none";startTerminal();});}

/* TERMINAL % */
function startTerminal(){
  terminal.style.display="block";
  terminal.innerHTML="Establishing encrypted satellite tunnel... <span>0%</span>";
  let percent=0;
  let span=terminal.querySelector("span");
  let load=setInterval(()=>{
    percent++;span.textContent=percent+"%";
    if(percent>=100){clearInterval(load);terminal.innerHTML+="<br>Satellite Link Established ✔";setTimeout(()=>{terminal.style.display="none";main.style.display="block";startGraphs();},1000);}
  },20);
}

/* FAKE HACK DOWNLOAD */
function startFakeHack(){
  main.style.display="none";
  hackScreen.style.display="block";
  hackScreen.innerHTML="Downloading secure satellite data... <span>0%</span>";
  let percent=0;
  let span=hackScreen.querySelector("span");
  let load=setInterval(()=>{
    percent++;span.textContent=percent+"%";
    if(percent===60){hackScreen.innerHTML+="<br><br>⚠ Unauthorized access detected!";}
    if(percent>=100){clearInterval(load);hackScreen.innerHTML+="<br>Redirecting...";setTimeout(()=>{window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0";},1500);}
  },25);
}

/* GRAPHS */
function startGraphs(){
  animateGraph("graph1");animateGraph("graph2");
}
function animateGraph(id){
  const graph=document.getElementById(id);
  setInterval(()=>{
    let bar=document.createElement("div");
    bar.className="line";
    bar.style.left=Math.random()*100+"%";
    bar.style.height=Math.random()*100+"%";
    graph.appendChild(bar);
    setTimeout(()=>bar.remove(),1000);
  },100);
}

/* ALL LINKS */
const prankLinks=[

function shuffleLinks(){
  const menu=document.getElementById("prank-menu");
  menu.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    menu.appendChild(a);
  });
}
shuffleLinks();
</script>

</html>
