<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:white;
}

/* INTRO */
#intro{
  position:fixed;inset:0;
  background:black;
  display:flex;align-items:center;justify-content:center;
  z-index:20000;
}
.glitch{
  font-size:clamp(2rem,6vw,4rem);
  font-weight:bold;
  position:relative;
  animation:skew 1s infinite alternate;
}
.glitch::before,.glitch::after{
  content:attr(data-text);
  position:absolute;left:0;width:100%;
}
.glitch::before{color:red;transform:translate(-4px,-2px)}
.glitch::after{color:blue;transform:translate(4px,2px)}
@keyframes skew{0%{transform:skew(0)}50%{transform:skew(2deg)}100%{transform:skew(-2deg)}}

/* BIOS + TERMINAL */
#bios,#terminal,#hack-screen{
  position:fixed;inset:0;
  background:black;color:#00ff00;
  font-family:monospace;
  padding:5vw;
  display:none;
  overflow:auto;
  z-index:15000;
}
#terminal span{color:#00ffff}

/* MAIN UI */
.aero{
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.08);
  padding:2.5rem;
  border-radius:20px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  text-align:center;
  width:min(95vw,700px);
  display:none;
}
h1{margin-bottom:1rem;text-transform:uppercase}
.description{
  font-size:0.95rem;
  opacity:0.85;
  margin-bottom:1rem;
  line-height:1.3;
  font-family:monospace;
}

/* BUTTONS */
.menu{margin-bottom:0.8rem;font-size:0.75rem}
.menu a{margin:0 4px;color:#ddd;text-decoration:none}
.menu a:hover{color:white}

.shuffle-btn{background:#222;color:white;font-size:0.75rem;padding:0.4rem 0.8rem;margin-bottom:0.5rem}
.download-btn{background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;font-size:1.5rem;padding:1rem 2rem;display:block;margin:0.6rem auto}
</style>
</head>

</div>

<div id="terminal"></div>

/* INTRO */
setTimeout(()=>{intro.style.display="none";startBIOS();},2500);

/* BIOS */
const bios=document.getElementById("bios");
const terminal=document.getElementById("terminal");
const main=document.getElementById("main");
const hackScreen=document.getElementById("hack-screen");

const biosLines=[
"Phoenix BIOS v12.4.7",
"Memory Test: 32768MB OK",
"Init Satellitez Array...",
"Auth Space Relay...",
"Booting Starlink WiFi OS..."
];

let i=0;
function typeLines(target,lines,callback){
  if(i<lines.length){
    let line=document.createElement("div");target.appendChild(line);
    let text=lines[i];let j=0;
    let typing=setInterval(()=>{
      line.textContent+=text[j];j++;
      if(j>=text.length){clearInterval(typing);i++;setTimeout(()=>typeLines(target,lines,callback),150);}
    },15);
  }else{i=0;setTimeout(callback,800);}
}
function startBIOS(){bios.style.display="block";typeLines(bios,biosLines,()=>{bios.style.display="none";startTerminal();});}

/* TERMINAL % */
function startTerminal(){
  terminal.style.display="block";
  terminal.innerHTML="Connecting to satellitez... <span>0%</span>";
  let percent=0;
  let span=terminal.querySelector("span");
  let load=setInterval(()=>{
    percent++;span.textContent=percent+"%";
    if(percent>=100){clearInterval(load);terminal.innerHTML+="<br>Link UP ✔";setTimeout(()=>{terminal.style.display="none";main.style.display="block";},1000);}
  },20);
}

/* FAKE HACK */

  hackScreen.style.display="block";

    percent++;span.textContent=percent+"%";
