body{

  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  color:white;
}

/* ========================= */
/* INTRO THUMBNAIL */
/* ========================= */

#intro-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:20000;
}

.glitch{
  font-size:clamp(2rem,7vw,4rem);
  font-weight:bold;
  position:relative;
  animation:skew 1s infinite alternate;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  width:100%;
}

.glitch::before{
  color:red;
  transform:translate(-4px,-2px);
}
.glitch::after{
  color:blue;
  transform:translate(4px,2px);
}

@keyframes skew{
  0%{transform:skew(0deg)}
  50%{transform:skew(2deg)}
  100%{transform:skew(-2deg)}
}

/* ========================= */
/* BIOS */
/* ========================= */

#bios{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  padding:5vw;
  z-index:15000;
  display:none;
  overflow:auto;
}

/* ========================= */
/* TERMINAL */
/* ========================= */

#terminal{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff00;
  font-family:monospace;
  padding:5vw;
  z-index:12000;
  display:none;
  overflow:auto;
}

/* ========================= */
/* MAIN */
/* ========================= */

.aero{
  backdrop-filter:blur(25px);
  background:rgba(255,255,255,0.1);
  padding:2rem;
  border-radius:20px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
  text-align:center;
  max-width:95vw;
  display:none;
}

.menu{
  margin-bottom:1rem;
}

.menu a{
  margin:0 8px;
  color:white;
  text-decoration:none;
  font-weight:bold;
  font-size:0.9rem;
}

/* Download Button Animation */

.download-btn{
  font-size:clamp(1rem,4vw,2rem);
  padding:1rem 2rem;
  background:linear-gradient(45deg,#ff00cc,#3333ff);
  border:none;
  border-radius:15px;
  color:white;
  cursor:pointer;
  transform:scale(0.1);
  animation:grow 1.5s forwards, float 2s infinite ease-in-out 1.5s;
}

@keyframes grow{
  to{transform:scale(1);}
}

@keyframes float{
  0%{transform:scale(1) translateY(0)}
  50%{transform:scale(1.05) translateY(-10px)}
  100%{transform:scale(1) translateY(0)}
}

.counter{margin-top:1rem;font-weight:bold}

    setTimeout(callback,800);
  }
}

function startBIOS(){
  bios.style.display="block";

}
