<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starlink Wi-Fi</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:black;color:white;font-family:Arial,sans-serif;height:100vh;overflow:hidden;}

/* STARTSCREEN */
#start-screen{
  position:fixed;inset:0;background:black;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  z-index:9999;
}
#start-title{font-size:3rem;color:#FFD700;margin-bottom:40px;text-align:center;}
#boot-btn{padding:15px 35px;font-size:1.4rem;background:#111;color:white;border:none;border-radius:10px;cursor:pointer;}

/* LOADING */
#loading{
  position:fixed;inset:0;background:black;color:#00ff00;
  font-family:Consolas,monospace;padding:30px;
  font-size:1.3rem;white-space:pre-wrap;display:none;
}

/* MAIN */
#main{
  display:none;position:fixed;inset:0;padding:20px;
  background:linear-gradient(180deg,#000814,#001d3d);
  display:flex;flex-direction:column;justify-content:space-between;
  transition:1s;
}
#links{text-align:center;margin-bottom:10px;}
#links a{margin:0 8px;color:#bbb;text-decoration:none;}
#links a:hover{color:white;}
button{padding:10px 20px;margin:10px auto;border:none;border-radius:8px;cursor:pointer;}
#shuffle{background:#111;color:white;}
#spinBtn{display:none;background:#333;color:yellow;}
#statsBtn{background:#222;color:#0ff;}
#download{background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;font-size:1.4rem;}
#text{text-align:center;font-size:1.6rem;margin:15px;}
#liveCounter{text-align:center;font-size:1.3rem;color:#0f0;margin:5px;}
#stats{display:none;font-family:Consolas,monospace;color:#0ff;margin:10px;text-align:center;}
#graphContainer{width:80%;margin:10px auto;}
.bar{height:25px;margin:8px 0;background:linear-gradient(90deg,#00ffcc,#0066ff);width:0%;border-radius:6px;transition:width 0.8s;}
.popup{position:fixed;right:20px;bottom:20px;background:#111;color:#0f0;padding:10px 15px;border-radius:8px;font-size:0.9rem;opacity:0.95;transition:all 0.5s;}
</style>
</head>
<body>

<div id="start-screen">
  <div id="start-title">Welcome to Wi-Fi</div>
  <button id="boot-btn">Connect</button>
</div>

<div id="loading"></div>

<div id="main">
  <div>
    <div id="links"></div>
    <button id="shuffle">🔀 Shuffle</button>
  </div>

  <div id="text">
    FREE STARLINK WIFI.<br>
    Very good. Not fake.<br>
    Elon Musk approved.<br>
    It free with Cybertruck.<br>
    It from Temu satellite.
  </div>

  <div id="liveCounter">👥 5482 people using this WiFi now</div>

  <div id="graphContainer">
    <div>🚀 Download Speed</div>
    <div class="bar" id="downloadBar"></div>
    <div>📤 Upload Speed</div>
    <div class="bar" id="uploadBar"></div>
  </div>

  <button id="statsBtn">📊 Show Internet Stats</button>
  <div id="stats"></div>

  <button id="download">⬇ DOWNLOAD FREE WIFI</button>
  <button id="spinBtn">🌪 Website spinnt!</button>
</div>

<script>

{url:"https://www.hackertyper.com/",label:"👨‍💻 Hacker Typer"}
];

/* ================= SHUFFLE BUTTON ================= */
let shuffleClicks=0;
function shuffleLinks(){
  const container=document.getElementById("links");
  container.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    container.appendChild(a);
  });
  shuffleClicks++;
  if(shuffleClicks>=20){
    document.getElementById("spinBtn").style.display="block";
  }
}
document.getElementById("shuffle").onclick=shuffleLinks;
shuffleLinks();

/* ================= LIVE COUNTER ================= */
let users=5482;
setInterval(()=>{
  users+=Math.floor(Math.random()*11)-5;
  document.getElementById("liveCounter").innerText="👥 "+users+" people using this WiFi now";
},2000);

/* ================= SPEED GRAPH ================= */
function updateSpeed(){
  const down=Math.floor(Math.random()*900)+100;
  const up=Math.floor(Math.random()*500)+50;
  document.getElementById("downloadBar").style.width=(down/10)+"%";
  document.getElementById("uploadBar").style.width=(up/10)+"%";
}
setInterval(updateSpeed,1500);
updateSpeed();

/* ================= FAKE STATS ================= */
document.getElementById("statsBtn").onclick=function(){
  const stats=document.getElementById("stats");
  if(stats.style.display==="none"){
    stats.style.display="block";
    stats.innerHTML=`IP: 192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}<br>
Port: ${Math.floor(Math.random()*60000)+1000}<br>
Ping: ${Math.floor(Math.random()*50)+5} ms<br>
Download Speed: ${Math.floor(Math.random()*900)+100} Mbps<br>
Upload Speed: ${Math.floor(Math.random()*500)+50} Mbps`;
  } else {stats.style.display="none";}
};

/* ================= DOWNLOAD / TERMINAL ================= */
document.getElementById("download").onclick=function(){
  const term=document.getElementById("loading");
  document.getElementById("main").style.display="none";
  term.style.display="block";
  const messages=[
    "Start Downloading...",
    "Virus Comprimised...",
    "Virus Decomprimised...",
    "Virus Installed...",
    "Virus Activated...",
    "SYSTEM HACKED..."
  ];
  let percent=0,msgIndex=0;
  const interval=setInterval(()=>{
    let line="";
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}[]<>/\\#$%^&*";
    for(let i=0;i<140;i++){line+=chars[Math.floor(Math.random()*chars.length)];}
    term.textContent+=line+"\n";
    percent++;
    if(percent%50===0 && msgIndex<messages.length){term.textContent+=messages[msgIndex]+"\n";msgIndex++;}
    if(percent>250){clearInterval(interval);term.textContent+="\nSYSTEM OVERRIDE COMPLETE...\n";
      setTimeout(()=>{window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0&autoplay=1";},1500);}
  },15);
};

/* ================= SPIN WEBSITE ================= */
document.getElementById("spinBtn").onclick=function(){
  const main=document.getElementById("main");
  main.style.transform="rotate(720deg) scale(1.1)";
  setTimeout(()=>{main.style.transform="rotate(0deg) scale(1)";},2000);
};

/* ================= POPUPS ================= */
const celebrities=[
"Elon Musk","Mark Zuckerberg","Jeff Bezos","Bill Gates","Sundar Pichai","Tim Cook","Larry Page","Sergey Brin","Jack Dorsey","Satya Nadella",
"Sheryl Sandberg","Susan Wojcicki","Evan Spiegel","Reed Hastings","Daniel Ek","Travis Kalanick","Brian Chesky","Marc Andreessen","Peter Thiel","Steve Wozniak",
"Adam Neumann","Drew Houston","Jan Koum","Evan Williams","Whitney Wolfe Herd","Tony Hsieh","Elon Musk Jr.","Mark Cuban","Richard Branson","Larry Ellison",
"Michael Dell","Jerry Yang","David Filo","Meg Whitman","Vinod Khosla","Marc Lore","Patrick Collison","John Collison","Anne Wojcicki","Paul Allen",
"George Hotz","Stewart Butterfield","Ben Silbermann","Kevin Systrom","Mike Krieger","Dara Khosrowshahi","Evan Sharp","Travis VanderZanden","Daniel Zhang","Lei Jun"
];
function showPopup(){
  const popup=document.createElement("div");
  popup.className="popup";
  popup.innerText=`${celebrities[Math.floor(Math.random()*celebrities.length)]} has just connected to WiFi!`;
  document.body.appendChild(popup);
  setTimeout(()=>{popup.remove();},3000);
}
setInterval(()=>{if(Math.random()<0.5){showPopup();}},1500+Math.random()*3500);

/* ================= BOOTING ================= */
document.getElementById("boot-btn").onclick=function(){
  const loading=document.getElementById("loading");
  document.getElementById("start-screen").style.display="none";
  loading.style.display="block";
  const bootLines=[
    "Booting FREE STARLINK WiFi...",
    "Connecting to Temu Satellite...",
    "Authorizing Elon Musk...",
    "Launching Interface..."
  ];
  let lineIndex=0,charIndex=0;
  function typeLine(){
    if(lineIndex<bootLines.length){
      if(charIndex<bootLines[lineIndex].length){
        loading.textContent+=bootLines[lineIndex][charIndex];
        charIndex++;
        setTimeout(typeLine,50);
      } else {
        loading.textContent+="\n";
        lineIndex++; charIndex=0;
        setTimeout(typeLine,200);
      }
    } else {setTimeout(()=>{loading.style.display="none";document.getElementById("main").style.display="flex";},500);}
  }
  typeLine();
};
</script>
</body>
</html>
