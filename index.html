<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Starlink WiFi</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}
body{background:#000;color:#fff;overflow-x:hidden;}

/* Boot Screen */
#bootScreen{
position:fixed;width:100%;height:100vh;background:#000;
display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;
}
.bootText{color:#00ff88;font-family:'Share Tech Mono',monospace;margin:5px 0;animation:blink 1s infinite alternate;}
@keyframes blink{from{opacity:0.5;}to{opacity:1;}}
button{padding:12px 26px;margin:10px;background:#00ff88;border:none;font-weight:bold;cursor:pointer;transition:0.3s;}
button:hover{transform:scale(1.05);}

/* Overlay */
#connectOverlay{
position:fixed;width:100%;height:100vh;background:#000;display:none;
flex-direction:column;align-items:center;justify-content:center;z-index:8000;color:#00ff88;
font-family:'Share Tech Mono',monospace;
}

/* Main */
#mainSite{display:none;padding:60px 20px;text-align:center;}
h1{font-size:38px;margin-bottom:20px;}
#topLinks{display:flex;justify-content:center;gap:15px;margin-bottom:30px;}
#topLinks a{color:#00ff88;text-decoration:none;font-weight:bold;}
#topLinks a:hover{text-decoration:underline;}
.buttonRow{margin-top:20px;}

/* Speed Gauge */
.gauge{width:260px;height:260px;border:6px solid #00ff88;border-radius:50%;margin:20px auto;position:relative;}
.needle{width:4px;height:120px;background:#00ff88;position:absolute;bottom:50%;left:50%;transform-origin:bottom center;transform:rotate(-90deg);transition:0.8s ease-out;}
.speedText{margin-top:15px;font-size:22px;}

/* Popup */
.popup{position:fixed;top:20px;right:-420px;background:#111;padding:15px 20px;border-left:4px solid #00ff88;color:#00ff88;font-size:14px;transition:0.6s ease;z-index:5000;}
.popup.show{right:20px;}

/* Terminal */
#terminal{display:none;position:fixed;width:100%;height:100vh;background:#000;color:#00ff00;font-family:'Share Tech Mono',monospace;padding:40px;z-index:9000;overflow:auto;}
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="bootScreen">
<div class="bootText">Booting system...</div>
<div class="bootText">Loading drivers...</div>
<div class="bootText">Scanning ports...</div>
<div class="bootText">Preparing connection...</div>
<h2 style="margin-top:20px;">Welcome to Starlink WiFi</h2>
<button onclick="startConnect()">Connect</button>
</div>

<!-- Overlay -->
<div id="connectOverlay">
<h2>Prepare to connect</h2>
<p>Connecting with WiFi...</p>
<p>Establishing secure satellite tunnel...</p>
</div>

<!-- Terminal -->
<div id="terminal"></div>

<!-- Main Site -->
<div id="mainSite">
<h1>Welcome to the Internet</h1>

<!-- Top Links (initially 5) -->
<div id="topLinks"></div>

<div class="buttonRow">
<button onclick="shuffleLinks()">Shuffle Links</button>
<button onclick="toggleStats()">Toggle Internet Stats</button>
<button onclick="startDownload()">Download</button>
</div>

<div id="statsSection" style="display:none;">
<div class="gauge">
<div class="needle" id="needle"></div>
</div>
<div class="speedText" id="speedText">0 Mbps</div>
<p id="ipInfo"></p>
<p id="pingInfo"></p>
<p id="portInfo"></p>
</div>

<div class="popup" id="popupBox"></div>
</div>

<script>
// === Connect Flow ===
function startConnect(){
  document.getElementById("bootScreen").style.display="none";
  document.getElementById("connectOverlay").style.display="flex";
  setTimeout(()=>{
    document.getElementById("connectOverlay").style.display="none";
    document.getElementById("mainSite").style.display="block";
    startSpeed();
    startPopups();
    initTopLinks();
  },3000);
}

// === Fake Speed ===
let speed=7000;
function startSpeed(){
  setInterval(()=>{
    let change=(Math.random()*1000)-500;
    speed+=change;
    if(speed<4000) speed=4000;
    if(speed>20000) speed=20000;
    document.getElementById("speedText").innerText=Math.floor(speed)+" Mbps";
    let rotation=(speed/20000)*180-90;
    document.getElementById("needle").style.transform="rotate("+rotation+"deg)";
  },1000);
  generateFakeData();
}
function generateFakeData(){
  let ip="192."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
  let ping=Math.floor(Math.random()*20+1)+" ms";
  let port=Math.floor(Math.random()*60000+1000);
  document.getElementById("ipInfo").innerText="IP: "+ip;
  document.getElementById("pingInfo").innerText="Ping: "+ping;
  document.getElementById("portInfo").innerText="Port: "+port;
}
function toggleStats(){
  let s=document.getElementById("statsSection");
  s.style.display=s.style.display==="none"?"block":"none";
}

// === Download + Rickroll ===
function startDownload(){
  let term=document.getElementById("terminal");
  term.style.display="block";
  term.innerHTML="";
  let lines=[
    "Initializing download...",
    "Scanning system...",
    "Virus detected...",
    "Launching exploit..."
  ];
  let index=0;
  function typeLine(){
    if(index<lines.length){
      let line=lines[index];
      let charIndex=0;
      let interval=setInterval(()=>{
        if(charIndex<line.length){
          term.innerHTML+=line[charIndex];
          charIndex++;
        } else {
          clearInterval(interval);
          term.innerHTML+="<br>";
          index++;
          setTimeout(typeLine,200);
        }
      },50);
    } else {
      setTimeout(()=>{
        window.location.href="https://www.youtube.com/watch?v=dQw4w9WgXcQ&autoplay=1";
      },1000);
    }
  }
  typeLine();
}

// === Links & Shuffle ===
const allLinks=[
  {url:"https://www.pointerpointer.com/", title:"Pointer Pointer"},
  {url:"https://cat-bounce.com/", title:"Cat Bounce"},
  {url:"https://www.staggeringbeauty.com/", title:"Staggering Beauty"},
  {url:"https://hackertyper.net/", title:"Hacker Typer"},
  {url:"https://theuselessweb.com/", title:"Useless Web"},
  {url:"https://zoomquilt.org/", title:"Infinite Zoom"},
  {url:"https://www.fallingfalling.com/", title:"Falling"},
  {url:"https://heeeeeeeey.com/", title:"Heeeey"},
  {url:"https://thatsthefinger.com/", title:"Thatsthefinger"},
  {url:"https://r33b.net/", title:"R33B"},
  {url:"https://bouncingdvdlogo.com/", title:"DVD Bounce"},
  {url:"https://longdogechallenge.com/", title:"Long Doge"},
  {url:"https://mondrianandme.com/", title:"Mondrian"},
  {url:"https://eelslap.com/", title:"Eel Slap"},
  {url:"https://isitchristmas.com/", title:"Is it Christmas"},
  {url:"https://endless.horse/", title:"Endless Horse"},
  {url:"https://checkboxrace.com/", title:"Checkbox Race"},
  {url:"https://crouton.net/", title:"Crouton"},
  {url:"https://smashthewalls.com/", title:"Smash Walls"},
  {url:"https://koalastothemax.com/", title:"Koalas"}
];

function initTopLinks(){
  shuffleLinks();
}

function shuffleLinks(){
  const topLinksDiv=document.getElementById("topLinks");
  topLinksDiv.innerHTML="";
  const shuffled=[...allLinks].sort(()=>0.5-Math.random());
  for(let i=0;i<5;i++){
    const a=document.createElement("a");
    a.href=shuffled[i].url;
    a.target="_blank";
    a.innerText=shuffled[i].title;
    topLinksDiv.appendChild(a);
  }
}

// === Popups / Easter Egg ===
const celebrities=[
"Elon Musk","Mark Zuckerberg","Jeff Bezos","Bill Gates",
"Sundar Pichai","Tim Cook","Sam Altman","Satya Nadella",
"Jensen Huang","Larry Page","Sergey Brin","Jack Dorsey",
"Reed Hastings","Brian Chesky","Peter Thiel"
];
function startPopups(){
  setInterval(()=>{
    let popup=document.getElementById("popupBox");
    let celeb=celebrities[Math.floor(Math.random()*celebrities.length)];
    popup.innerText=celeb+" just connected to this WiFi";
    popup.classList.add("show");
    setTimeout(()=>popup.classList.remove("show"),4000);
  },Math.random()*9000+4000);
}
</script>

</body>
</html>
