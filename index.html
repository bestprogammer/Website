<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE STARLINK WIFI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:black;color:white;height:100vh;overflow:hidden;font-family:Arial,sans-serif;}
#loading-overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:#00ff00;
  font-family:monospace;font-size:1.2rem;padding:40px;z-index:9999;display:flex;
  flex-direction:column;justify-content:center;align-items:center;text-align:center;
}
.terminal-line{margin-bottom:5px;}
#main{position:fixed;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:25px;background:linear-gradient(180deg,#000814,#001d3d);display:none;}
#links{font-size:1rem;line-height:1.7;text-align:center;}
#links a{color:#aaa;margin:0 8px;text-decoration:none;}
#links a:hover{color:white;}
#shuffle{margin:12px auto;padding:8px 14px;background:#111;color:white;border:none;cursor:pointer;display:block;}
#text{text-align:center;font-size:2rem;font-family:"Comic Sans MS",cursive;line-height:2;margin-top:20px;}
#download{width:80%;margin:20px auto;padding:20px;font-size:2rem;background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;border:none;cursor:pointer;display:block;border-radius:12px;}
#terminal{position:fixed;inset:0;background:black;color:#00ff00;font-family:monospace;padding:20px;display:none;overflow:auto;white-space:pre-wrap;font-size:1.2rem;}
#secretBtn{position:fixed;bottom:20px;right:20px;padding:10px 15px;background:#222;color:white;border:none;display:none;cursor:pointer;z-index:9999;}
#octocat{position:fixed;bottom:50px;left:-200px;width:150px;z-index:9998;transition:left 5s linear;}
#octocat.jump{animation:jump 1s infinite alternate;}
@keyframes jump{0%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(10deg);}100%{transform:translateY(0) rotate(-10deg);}}
</style>
</head>
<body>

<div id="loading-overlay"></div>

<div id="main">
  <div>
    <div id="links"></div>
    <button id="shuffle" onclick="shuffleLinks()">🔀 Shuffle</button>
  </div>

  <div id="text">
    FREE STARLINK WIFI.<br>
    Very good. Not fake.<br>
    Elon Musk approved.<br>
    It free with Cybertruck.<br>
    It from Temu satellite.<br>
    100% real space internet.
  </div>

  <button id="download" onclick="startTerminal()">⬇️ DOWNLOAD FREE WIFI</button>
</div>

<div id="terminal"></div>

<button id="secretBtn" onclick="runCat()">🐱 Launch Octocat</button>
<img id="octocat" src="https://github.githubassets.com/images/modules/logos_page/Octocat.png">

<script>
const prankLinks=[

{url:"https://leekspin.com/",label:"🌀 Leekspin"},
{url:"https://www.donothingfor2minutes.com/",label:"😌 Zen Timer"},
{url:"https://pixelsfighting.com/",label:"🧱 Pixels Fighting"},
{url:"https://eelslap.com/",label:"🐟 Slap with an Eel"},
{url:"https://www.ismycomputeron.com/",label:"💻 Is My Computer On?"},
{url:"https://whatsmystarbucksname.com/",label:"☕ Starbucks Name?"},
{url:"https://shadyurl.com/",label:"🔗 Shady URL Generator"},
{url:"https://zombo.com/",label:"🌐 ZomboCom"},

{url:"https://www.hackertyper.com/",label:"👨‍💻 Hacker Typer"}
];

function shuffleLinks(){
  const container=document.getElementById("links");
  container.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    container.appendChild(a);
  });
}
shuffleLinks();

/* ================= LOADING ================= */
const overlay=document.getElementById("loading-overlay");
const loadLines=[
"Booting FREE STARLINK WiFi v9.9...",
"Connecting to Temu satellite...",
"Verifying Elon Musk approval...",
"Initializing Cybertruck interface...",
"Injecting Galactic Internet packets...",
"Preparing download system...",
"System stable... Launching interface..."
];

let li=0;
function addLine(){
  if(li<loadLines.length){
    const div=document.createElement("div");
    div.className="terminal-line";
    div.textContent=loadLines[li];
    overlay.appendChild(div);
    li++;
    setTimeout(addLine,600);
  } else {
    setTimeout(()=>{overlay.style.display="none";document.getElementById("main").style.display="flex";},800);
  }
}
addLine();

/* ================= TERMINAL DOWNLOAD + GLITCH BEFORE REDIRECT ================= */
function startTerminal(){
  document.getElementById("main").style.display="none";
  const term=document.getElementById("terminal");
  term.style.display="block";
  term.innerHTML="";

  const lines=[
"FREE STARLINK WIFI SYSTEM v9.9.9",
"Connecting to Temu Satellite...",
"Verifying Elon Musk approval...",
"Cybertruck detected...",
"Initializing Galactic Internet..."
  ];

  let i=0;
  function randomChar(){const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";return chars[Math.floor(Math.random()*chars.length)];}
  function typeLine(text,callback){
    let progress=0;
    const interval=setInterval(()=>{
      let output="";
      for(let j=0;j<text.length;j++){output+= j<progress ? text[j] : randomChar();}
      term.innerHTML="\n"+output;
      progress++;
      if(progress>text.length){clearInterval(interval);term.innerHTML+="\n";callback();}
    },30);
  }
  function next(){if(i<lines.length){typeLine(lines[i],()=>{i++;next();});} else {loadPercent();}}
  next();
}

function loadPercent(){
  const term=document.getElementById("terminal");
  let percent=0;
  const interval=setInterval(()=>{
    let glitch="";
    for(let j=0;j<20;j++){glitch+=String.fromCharCode(33+Math.floor(Math.random()*94));}
    term.innerHTML="Downloading Galactic WiFi: "+percent+"% "+glitch+"\n";
    percent++;
    if(percent>100){clearInterval(interval);
      term.innerHTML+="\nConnection established.\nApplying final glitch...\n";
      setTimeout(()=>{window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0";},1200);
    }
  },25);
}

/* ================= EASTER EGG ================= */
let clickCount=0;
document.addEventListener("click",()=>{
  clickCount++;
  if(clickCount===20){document.getElementById("secretBtn").style.display="block";}
});
function runCat(){
  const cat=document.getElementById("octocat");
  cat.classList.add("jump");
  cat.style.left="120vw";
  setTimeout(()=>{cat.classList.remove("jump"); cat.style.left="-200px";},5000);
}
</script>

</body>
</html>
