<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE STARLINK WIFI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:black;
  color:white;
  height:100vh;
  overflow:hidden;
  font-family:Segoe UI,Arial,sans-serif;
}

/* START SCREEN */
#start-screen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:3rem;
  font-weight:bold;
  text-align:center;
  z-index:10000;
}

#start-text{
  margin-top:20px;
  font-size:3rem;
  letter-spacing:0.1em;
  color:#FFD700; /* Golden nur für deinen Namen */
}

/* WAPPEN */
#wappen{
  width:150px;
  height:auto;
}

/* BOOTING LOADING */
#loading-overlay{
  position:fixed;inset:0;
  background:black;
  color:#00ff00;
  font-family:Consolas,monospace;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:flex-start;
  font-size:1.5rem;
  z-index:9999;
  padding:20px;
  white-space:pre-wrap;
  display:none;
}

/* START BUTTON */
#start-btn{
  margin-top:40px;
  padding:10px 20px;
  font-size:1.5rem;
  background:#111;
  color:#00ff00;
  border:none;
  cursor:pointer;
}

/* MAIN */
#main{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:space-between;
  padding:30px;
  background:linear-gradient(180deg,#000814,#001d3d);
  transition: transform 1s ease-in-out;
}

#links{text-align:center;font-size:1rem;}
#links a{color:#bbb;margin:0 10px;text-decoration:none;}
#links a:hover{color:white;}
#shuffle{display:block;margin:15px auto;padding:8px 15px;background:#111;border:none;color:white;cursor:pointer;}
#text{text-align:center;font-size:2rem;font-weight:600;line-height:1.8;margin-top:20px;}
#download{width:80%;margin:20px auto;padding:20px;font-size:2rem;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;}

/* TERMINAL */
#terminal{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff00;
  font-family:Consolas,monospace;
  font-size:1rem;
  padding:20px;
  display:none;
  overflow:hidden;
  white-space:pre;
  transform: rotateX(10deg);
}

/* SPIN BUTTON */
#spinBtn{
  display:none;
  margin:20px auto;
  padding:15px 25px;
  font-size:1.5rem;
  background:#333;
  color:#ff0;
  border:none;
  cursor:pointer;
  border-radius:10px;
}
</style>
</head>
<body>

<div id="start-screen">
  <img id="wappen" src="wappen.png" alt="Wappen">
  <div id="start-text">Enea Rohner</div>
  <button id="start-btn">START BOOTING</button>
</div>

<div id="loading-overlay"></div>

<div id="main">
  <div>
    <div id="links"></div>
    <button id="shuffle">🔀 Shuffle</button>
  </div>

  <div id="text">
    FREE STARLINK WIFI.<br>
    Very good. Not fake.<br>
    Elon Musk approved.<br>
    It free with Cybertruck.<br>
    It from Temu satellite.
  </div>

  <button id="download" onclick="startDownload()">⬇ DOWNLOAD FREE WIFI</button>
  <button id="spinBtn" onclick="spinWebsite()">🌪 Website spinnt!</button>
</div>

<div id="terminal"></div>

<script>
/* ================= LINKS ================= */
const prankLinks=[
{url:"https://www.youtube.com/watch?v=xvFZjo5PgG0",label:"🎵 Rickroll"},
{url:"https://fakeupdate.net/win10/",label:"🖥 Windows Update"},

{url:"https://ninjaflex.com/",label:"🥷 Ninja Flex"},
{url:"https://cat-bounce.com/",label:"🐱 Cat Bounce"},
{url:"https://corndog.io/",label:"🌽 Corndog"},
{url:"https://zoomquilt.org/",label:"🔍 Zoomquilt"},
{url:"https://staggeringbeauty.com/",label:"💃 Staggering Beauty"},
{url:"https://longdogechallenge.com/",label:"🐕 Long Doge"},
{url:"https://www.patience-is-a-virtue.org/",label:"⏳ Patience"},
{url:"https://thatsthefinger.com/",label:"🖕 The Finger"},
{url:"https://isitchristmas.com/",label:"🎄 Christmas?"},
{url:"https://trypap.com/",label:"✍ Password Fun"},
{url:"https://www.rrrgggbbb.com/",label:"🌈 RGB"},
{url:"https://beesbeesbees.com/",label:"🐝 Bees"},
{url:"https://chrismckenzie.com/",label:"👀 Blink"},
{url:"https://www.koalastothemax.com/",label:"🧩 Koala"},
{url:"https://leekspin.com/",label:"🌀 Leekspin"},
{url:"https://www.donothingfor2minutes.com/",label:"😌 Do Nothing"},
{url:"https://pixelsfighting.com/",label:"🧱 Pixels"},
{url:"https://eelslap.com/",label:"🐟 Eel Slap"},
{url:"https://www.ismycomputeron.com/",label:"💻 Computer On?"},
{url:"https://whatsmystarbucksname.com/",label:"☕ Starbucks"},
{url:"https://shadyurl.com/",label:"🔗 Shady URL"},
{url:"https://zombo.com/",label:"🌐 Zombo"},
{url:"https://thisissand.com/",label:"🏖 Sand"},
{url:"https://hasthelargehadroncolliderdestroyedtheworldyet.com/",label:"💥 LHC"},
{url:"https://drawastickman.com/",label:"✏ Stickman"},
{url:"https://burymewithmymoney.com/",label:"💸 Money"},
{url:"https://corgiorgy.com/",label:"🐶 Corgi"},
{url:"https://notsend.com/",label:"📧 Not Send"},
{url:"https://www.ringingtelephone.com/",label:"☎ Ring"},
{url:"https://www.hackertyper.com/",label:"👨‍💻 Hacker Typer"}
];

function shuffleLinks(){
  const container=document.getElementById("links");
  container.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    container.appendChild(a);
  });
  shuffleClicks++;
  if(shuffleClicks>=20){
    document.getElementById("spinBtn").style.display="block";
  }
}
let shuffleClicks=0;
shuffleLinks();

/* ================= STARTSCREEN ANIMATION ================= */
const startText=document.getElementById("start-text");
const startScreen=document.getElementById("start-screen");
const loadingOverlay=document.getElementById("loading-overlay");
document.getElementById("start-btn").addEventListener("click",()=>{
  let full="Enea Rohner";
  let display=full.split("");
  let interval=setInterval(()=>{
    if(display.length>2){
      display.splice(Math.floor(Math.random()*display.length),1);
      startText.textContent=display.join("");
    } else {
      clearInterval(interval);
      startScreen.style.display="none";
      startBooting();
    }
  },200);
});

/* ================= LOADING / TYPING EFFECT ================= */
function startBooting(){
  loadingOverlay.style.display="flex";
  const bootLines=[
    "Booting FREE STARLINK WiFi...",
    "Connecting to Temu Satellite...",
    "Authorizing Elon Musk...",
    "Launching Interface..."
  ];
  let lineIndex=0;
  let charIndex=0;
  function typeLine(){
    if(lineIndex<bootLines.length){
      if(charIndex<bootLines[lineIndex].length){
        loadingOverlay.textContent += bootLines[lineIndex][charIndex];
        charIndex++;
        setTimeout(typeLine,50);
      } else {
        loadingOverlay.textContent += "\n";
        lineIndex++;
        charIndex=0;
        setTimeout(typeLine,200);
      }
    } else {
      setTimeout(()=>{loadingOverlay.style.display="none"; document.getElementById("main").style.display="flex";},500);
    }
  }
  typeLine();
}

/* ================= DOWNLOAD TERMINAL ================= */
function startDownload(){
  document.getElementById("main").style.display="none";
  const term=document.getElementById("terminal");
  term.style.display="block";

  const messages=[
    "Start Downloading...",
    "Virus Comprimised...",
    "Virus Decomprimised...",
    "Virus Installed...",
    "Virus Activated...",
    "SYSTEM HACKED..."
  ];

  let percent=0;
  let msgIndex=0;

  const interval=setInterval(()=>{
    let line="";
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}[]<>/\\#$%^&*";
    for(let i=0;i<140;i++){
      line+=chars[Math.floor(Math.random()*chars.length)];
    }
    term.textContent+=line+"\n";

    percent++;
    if(percent % 50 === 0 && msgIndex<messages.length){
      term.textContent+=messages[msgIndex]+"\n";
      msgIndex++;
    }

    if(percent>250){
      clearInterval(interval);
      term.textContent+="\nSYSTEM OVERRIDE COMPLETE...\n";
      setTimeout(()=>{
        window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0&autoplay=1";
      },1500);
    }
  },15);
}

/* ================= SPIN WEBSITE ================= */
function spinWebsite(){
  const main=document.getElementById("main");
  main.style.transform="rotate(720deg) scale(1.1)";
  setTimeout(()=>{main.style.transform="rotate(0deg) scale(1)";},2000);
}
</script>
</body>
</html>
