<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FREE STARLINK WIFI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:black;
  color:white;
  height:100vh;
  overflow:hidden;
  font-family:Segoe UI,Arial,sans-serif;
}

/* START TEXT */
#start-text{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:4rem;
  font-weight:bold;
  color:#00ff00;
  text-align:center;
  z-index:10000;
}

/* LOADING */
#loading-overlay{
  position:fixed;inset:0;
  background:black;
  color:#00ff00;
  font-family:Consolas,monospace;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:1.5rem;
  z-index:9999;
}

/* MAIN */
#main{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  justify-content:space-between;
  padding:30px;
  background:linear-gradient(180deg,#000814,#001d3d);
}

#links{text-align:center;font-size:1rem;}
#links a{color:#bbb;margin:0 10px;text-decoration:none;}
#links a:hover{color:white;}
#shuffle{display:block;margin:15px auto;padding:8px 15px;background:#111;border:none;color:white;cursor:pointer;}
#text{text-align:center;font-size:2rem;font-weight:600;line-height:1.8;margin-top:20px;}
#download{width:80%;margin:20px auto;padding:20px;font-size:2rem;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(45deg,#ff00cc,#3333ff);color:white;}

/* TERMINAL */
#terminal{
  position:fixed;
  inset:0;
  background:black;
  color:#00ff00;
  font-family:Consolas,monospace;
  font-size:1rem;
  padding:20px;
  display:none;
  overflow:hidden;
  white-space:pre;
}

/* OCTOCAT */
#secretBtn{position:fixed;bottom:20px;right:20px;display:none;padding:10px 15px;background:#222;border:none;color:white;cursor:pointer;z-index:9999;}
#octocat{position:fixed;bottom:60px;left:-200px;width:140px;transition:left 5s linear;}
</style>
</head>
<body>

<div id="start-text">STARTING OVERDRIVE</div>

<div id="loading-overlay">
Booting FREE STARLINK WiFi...<br>
Connecting to Temu Satellite...<br>
Authorizing Elon Musk...<br>
Launching Interface...
</div>

<div id="main">
  <div>
    <div id="links"></div>
    <button id="shuffle" onclick="shuffleLinks()">🔀 Shuffle</button>
  </div>

  <div id="text">
    FREE STARLINK WIFI.<br>
    Very good. Not fake.<br>
    Elon Musk approved.<br>
    It free with Cybertruck.<br>
    It from Temu satellite.
  </div>

  <button id="download" onclick="startDownload()">⬇ DOWNLOAD FREE WIFI</button>
</div>

<div id="terminal"></div>

<button id="secretBtn" onclick="runCat()">🐱 Launch Octocat</button>
<img id="octocat" src="https://github.githubassets.com/images/modules/logos_page/Octocat.png">

<script>
/* ================= LINKS ================= */
const prankLinks=[
{url:"https://www.youtube.com/watch?v=xvFZjo5PgG0",label:"🎵 Rickroll"},
{url:"https://fakeupdate.net/win10/",label:"🖥 Windows Update"},
{url:"https://pointerpointer.com/",label:"🤑 Gewinnspiel"},
{url:"https://omfgdogs.com/",label:"🐶 Hunde-Party"},
{url:"https://theuselessweb.com/",label:"🌀 Useless Button"},
{url:"https://endless.horse/",label:"🐴 Endless Horse"},
{url:"https://heeeeeeeey.com/",label:"🎤 Heeeey!"},
{url:"https://ninjaflex.com/",label:"🥷 Ninja Flex"},
{url:"https://cat-bounce.com/",label:"🐱 Cat Bounce"},
{url:"https://corndog.io/",label:"🌽 Corndog"},
{url:"https://zoomquilt.org/",label:"🔍 Zoomquilt"},
{url:"https://staggeringbeauty.com/",label:"💃 Staggering Beauty"},
{url:"https://longdogechallenge.com/",label:"🐕 Long Doge"},
{url:"https://www.patience-is-a-virtue.org/",label:"⏳ Patience"},
{url:"https://thatsthefinger.com/",label:"🖕 The Finger"},
{url:"https://isitchristmas.com/",label:"🎄 Christmas?"},
{url:"https://trypap.com/",label:"✍ Password Fun"},
{url:"https://www.rrrgggbbb.com/",label:"🌈 RGB"},
{url:"https://beesbeesbees.com/",label:"🐝 Bees"},
{url:"https://chrismckenzie.com/",label:"👀 Blink"},
{url:"https://www.koalastothemax.com/",label:"🧩 Koala"},
{url:"https://leekspin.com/",label:"🌀 Leekspin"},
{url:"https://www.donothingfor2minutes.com/",label:"😌 Do Nothing"},
{url:"https://pixelsfighting.com/",label:"🧱 Pixels"},
{url:"https://eelslap.com/",label:"🐟 Eel Slap"},
{url:"https://www.ismycomputeron.com/",label:"💻 Computer On?"},
{url:"https://whatsmystarbucksname.com/",label:"☕ Starbucks"},
{url:"https://shadyurl.com/",label:"🔗 Shady URL"},
{url:"https://zombo.com/",label:"🌐 Zombo"},
{url:"https://thisissand.com/",label:"🏖 Sand"},
{url:"https://hasthelargehadroncolliderdestroyedtheworldyet.com/",label:"💥 LHC"},
{url:"https://drawastickman.com/",label:"✏ Stickman"},
{url:"https://burymewithmymoney.com/",label:"💸 Money"},
{url:"https://corgiorgy.com/",label:"🐶 Corgi"},
{url:"https://notsend.com/",label:"📧 Not Send"},
{url:"https://www.ringingtelephone.com/",label:"☎ Ring"},
{url:"https://www.hackertyper.com/",label:"👨‍💻 Hacker Typer"}
];

function shuffleLinks(){
  const container=document.getElementById("links");
  container.innerHTML="";
  prankLinks.sort(()=>0.5-Math.random()).slice(0,6).forEach(link=>{
    const a=document.createElement("a");
    a.href=link.url;
    a.target="_blank";
    a.textContent=link.label;
    container.appendChild(a);
  });
}

shuffleLinks();

/* ================= START TEXT + LOADING ================= */
setTimeout(()=>{
  document.getElementById("start-text").style.display="none";
  document.getElementById("loading-overlay").style.display="none";
  document.getElementById("main").style.display="flex";
},2500);

/* ================= DOWNLOAD TERMINAL ================= */
function startDownload(){
  document.getElementById("main").style.display="none";
  const term=document.getElementById("terminal");
  term.style.display="block";

  let percent=0;
  const interval=setInterval(()=>{
    let line="";
    const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789{}[]<>/\\#$%^&*";
    for(let i=0;i<140;i++){
      line+=chars[Math.floor(Math.random()*chars.length)];
    }
    term.textContent+=line+"\n";
    percent++;
    if(percent>160){
      clearInterval(interval);
      term.textContent+="\nSYSTEM OVERRIDE...\nFINALIZING CONNECTION...\n";
      setTimeout(()=>{
        window.location.href="https://www.youtube.com/watch?v=xvFZjo5PgG0&autoplay=1";
      },1200);
    }
  },15);
}

/* ================= OCTOCAT ================= */
let clicks=0;
document.addEventListener("click",()=>{
  clicks++;
  if(clicks===20){
    document.getElementById("secretBtn").style.display="block";
  }
});
function runCat(){
  const cat=document.getElementById("octocat");
  cat.style.left="120vw";
  setTimeout(()=>{cat.style.left="-200px";},5000);
}
</script>

</body>
</html>
